<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌸 初恋模拟器 · 完整故事版</title>
    <style>
        /* ===== 闪亮少女风 ===== */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Comic Sans MS', 'Chalkboard SE', 'PingFang SC', 'Microsoft YaHei', cursive, sans-serif;
            min-height: 100vh;
            background: linear-gradient(145deg, #fff0f5 0%, #ffe4e1 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
        }
        .sparkle-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; overflow: hidden; z-index: 0;
        }
        .sparkle-bg span {
            position: absolute;
            font-size: 24px;
            color: rgba(255, 215, 0, 0.25);
            animation: floatSparkle 12s infinite alternate ease-in-out;
        }
        .sparkle-bg span:nth-child(1) { top: 10%; left: 5%; animation-delay: 0s; font-size: 30px; }
        .sparkle-bg span:nth-child(2) { top: 20%; right: 8%; animation-delay: 2s; font-size: 28px; }
        .sparkle-bg span:nth-child(3) { bottom: 30%; left: 12%; animation-delay: 4s; font-size: 34px; }
        .sparkle-bg span:nth-child(4) { bottom: 15%; right: 5%; animation-delay: 6s; font-size: 26px; }
        .sparkle-bg span:nth-child(5) { top: 50%; left: 50%; animation-delay: 3s; font-size: 40px; opacity: 0.15; }
        @keyframes floatSparkle {
            0% { transform: translate(0, 0) rotate(0deg) scale(1); }
            100% { transform: translate(30px, -40px) rotate(20deg) scale(1.1); }
        }
        #app {
            max-width: 1100px; width: 100%;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border-radius: 48px;
            box-shadow: 0 20px 60px rgba(233, 30, 99, 0.12), 0 0 0 2px #ffdab9 inset, 0 0 0 4px #fff5f7 inset;
            padding: 28px 32px 32px;
            display: flex;
            flex-direction: column;
            min-height: 90vh;
            position: relative;
            z-index: 1;
            border: 1px solid rgba(255, 215, 0, 0.2);
        }
        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 3px solid #ffdab9;
            padding-bottom: 16px;
            flex-wrap: wrap;
            gap: 12px;
        }
        .game-title {
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(135deg, #ffb347, #ff69b4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 2px 12px rgba(255, 105, 180, 0.2);
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .game-title i { font-style: normal; -webkit-text-fill-color: initial; color: #ffb347; animation: sparkleTitle 2s infinite; }
        @keyframes sparkleTitle {
            0%, 100% { transform: scale(1) rotate(0deg); }
            50% { transform: scale(1.15) rotate(5deg); }
        }
        .game-stats-mini {
            display: flex; gap: 14px; font-size: 14px; color: #b05a6a; flex-wrap: wrap;
        }
        .game-stats-mini span {
            background: rgba(255, 218, 185, 0.4);
            padding: 6px 18px; border-radius: 40px; font-weight: 600;
            border: 1px solid #ffdab9; color: #a0525a;
            box-shadow: 0 2px 8px rgba(255, 182, 193, 0.15);
            backdrop-filter: blur(4px);
        }
        .stat-highlight { color: #d81b60; }

        .game-body {
            display: flex; flex: 1; gap: 24px; margin-top: 18px; min-height: 500px;
        }
        .narrative-panel {
            flex: 2;
            background: rgba(255, 248, 245, 0.7);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            border-radius: 32px;
            border: 2px solid #ffdab9;
            padding: 20px 24px;
            display: flex;
            flex-direction: column;
            min-height: 480px;
            max-height: 620px;
            overflow-y: auto;
            box-shadow: 0 8px 32px rgba(255, 182, 193, 0.12);
        }
        .narrative-panel::-webkit-scrollbar { width: 6px; }
        .narrative-panel::-webkit-scrollbar-thumb { background: #ffb6c1; border-radius: 20px; }
        .narrative-content {
            flex: 1;
            font-size: 15px;
            line-height: 1.8;
            color: #4a2a3a;
            white-space: pre-wrap;
            word-break: break-word;
        }
        .narrative-content .msg-dm {
            color: #880e4f;
            background: rgba(255, 182, 193, 0.25);
            padding: 8px 18px;
            border-radius: 30px;
            display: inline-block;
            margin: 4px 0 10px;
            font-weight: 600;
            border-left: 5px solid #ff69b4;
            backdrop-filter: blur(4px);
        }
        .narrative-content .msg-player {
            color: #1a5276;
            background: rgba(235, 245, 251, 0.7);
            padding: 8px 18px;
            border-radius: 30px;
            display: inline-block;
            margin: 4px 0 10px;
            font-weight: 600;
            border-left: 5px solid #2980b9;
        }
        .narrative-content .msg-event {
            color: #7d6608;
            background: rgba(255, 249, 196, 0.6);
            padding: 8px 18px;
            border-radius: 30px;
            display: inline-block;
            margin: 4px 0 10px;
            font-weight: 600;
            border-left: 5px solid #f1c40f;
        }
        .narrative-content .msg-system {
            color: #8a6d6d;
            font-style: italic;
            padding: 4px 0;
            border-top: 1px dashed #ffdab9;
            margin-top: 8px;
        }
        .narrative-content .choice-block {
            margin: 14px 0 10px;
            padding: 16px 20px;
            background: rgba(255, 218, 185, 0.25);
            border-radius: 36px;
            border: 2px solid #ffdab9;
            backdrop-filter: blur(4px);
        }
        .narrative-content .choice-item {
            display: block;
            padding: 12px 22px;
            margin: 10px 0;
            background: white;
            border-radius: 60px;
            cursor: pointer;
            border: 2px solid #ffb6c1;
            transition: all 0.25s;
            font-size: 15px;
            color: #4a2a3a;
            font-weight: 500;
            box-shadow: 0 4px 12px rgba(255, 182, 193, 0.15);
            position: relative;
        }
        .narrative-content .choice-item:hover {
            background: #fff0f5;
            border-color: #ff69b4;
            transform: translateX(8px) scale(1.02);
            box-shadow: 0 6px 20px rgba(255, 105, 180, 0.2);
        }
        .narrative-content .choice-item.selected {
            background: #ffb6c1;
            border-color: #d81b60;
            color: #fff;
        }
        .narrative-content .choice-item.disabled {
            opacity: 0.5;
            pointer-events: none;
        }
        .narrative-content .result-flash {
            background: rgba(255, 182, 193, 0.2);
            border-radius: 30px;
            padding: 8px 18px;
            margin: 6px 0;
            border-left: 6px solid #ff69b4;
            font-weight: 600;
            color: #880e4f;
            backdrop-filter: blur(4px);
        }
        .narrative-content .monthly-summary {
            background: rgba(255, 218, 185, 0.3);
            border-radius: 24px;
            padding: 12px 18px;
            margin: 10px 0;
            border: 2px solid #ffdab9;
        }

        .status-panel {
            flex: 1;
            min-width: 210px;
            background: rgba(255, 248, 245, 0.7);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            border-radius: 32px;
            padding: 20px 22px;
            border: 2px solid #ffdab9;
            display: flex;
            flex-direction: column;
            gap: 6px;
            max-height: 620px;
            overflow-y: auto;
            box-shadow: 0 8px 32px rgba(255, 182, 193, 0.12);
        }
        .status-panel::-webkit-scrollbar { width: 4px; }
        .status-panel::-webkit-scrollbar-thumb { background: #ffb6c1; border-radius: 20px; }
        .status-section-title {
            font-size: 15px;
            font-weight: 700;
            color: #b05a6a;
            letter-spacing: 0.5px;
            margin-top: 10px;
            border-bottom: 2px solid #ffdab9;
            padding-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .status-row {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            padding: 4px 0;
            color: #4a2a3a;
        }
        .status-row .label { color: #b05a6a; }
        .status-row .value { font-weight: 700; }
        .status-row .value.good { color: #2e7d32; }
        .status-row .value.warn { color: #e67e22; }
        .status-row .value.danger { color: #c2185b; }
        .status-row .value.heart { color: #e91e63; }
        .npc-list {
            font-size: 13px;
            margin-top: 4px;
        }
        .npc-item {
            display: flex;
            justify-content: space-between;
            padding: 4px 0;
            border-bottom: 1px dashed #ffdab9;
            cursor: pointer;
            transition: background 0.2s;
            border-radius: 12px;
            padding: 4px 8px;
        }
        .npc-item:hover { background: rgba(255, 182, 193, 0.15); }
        .npc-item .npc-name { color: #4a2a3a; font-weight: 500; }
        .npc-item .npc-like { color: #e91e63; font-weight: 700; }
        .npc-item.target { background: rgba(255, 105, 180, 0.15); border-left: 4px solid #ff69b4; }

        .action-bar {
            margin-top: 20px;
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            border-top: 3px solid #ffdab9;
            padding-top: 18px;
            align-items: center;
        }
        .action-btn {
            background: linear-gradient(145deg, #ffb6c1, #ff69b4);
            border: none;
            padding: 10px 28px;
            border-radius: 60px;
            font-size: 16px;
            font-weight: 700;
            color: white;
            cursor: pointer;
            transition: all 0.25s;
            box-shadow: 0 6px 20px rgba(255, 105, 180, 0.25);
            border: 1px solid rgba(255, 255, 255, 0.3);
            letter-spacing: 0.5px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .action-btn:hover {
            transform: translateY(-4px) scale(1.02);
            box-shadow: 0 10px 30px rgba(255, 105, 180, 0.35);
            background: linear-gradient(145deg, #ff69b4, #d81b60);
        }
        .action-btn.primary {
            background: linear-gradient(145deg, #ffb347, #ff8a5c);
            box-shadow: 0 6px 20px rgba(255, 179, 71, 0.3);
        }
        .action-btn.primary:hover {
            background: linear-gradient(145deg, #ff8a5c, #e67e22);
        }
        .action-btn.secondary {
            background: linear-gradient(145deg, #d4a5b5, #b05a6a);
            box-shadow: 0 6px 20px rgba(176, 90, 106, 0.2);
        }
        .action-btn.secondary:hover {
            background: linear-gradient(145deg, #b05a6a, #8a4a5a);
        }
        .action-btn:disabled {
            opacity: 0.4;
            pointer-events: none;
            transform: none;
        }
        .action-hint {
            flex: 1;
            text-align: right;
            font-size: 14px;
            color: #b05a6a;
            font-weight: 500;
            padding-right: 8px;
        }

        @media (max-width: 720px) {
            #app { padding: 20px; }
            .game-body { flex-direction: column; }
            .narrative-panel { max-height: 400px; min-height: 280px; }
            .status-panel { max-height: 280px; min-height: 200px; }
            .game-title { font-size: 22px; }
            .game-stats-mini { font-size: 12px; gap: 8px; }
            .game-stats-mini span { padding: 4px 14px; }
            .action-btn { padding: 8px 20px; font-size: 14px; }
            .action-hint { text-align: left; width: 100%; margin-top: 8px; }
        }
        @media (max-width: 480px) {
            #app { padding: 14px; }
            .game-header { flex-direction: column; align-items: flex-start; }
            .narrative-panel { max-height: 340px; padding: 16px; }
            .status-panel { max-height: 260px; padding: 16px; }
        }
        .fade-in { animation: fadeIn 0.3s ease-in; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .text-muted { color: #b05a6a; font-size: 13px; opacity: 0.7; }

        .petal {
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            font-size: 22px;
            transition: all 2.2s cubic-bezier(0.2, 0.8, 0.2, 1);
            opacity: 1;
        }
        .petal.fall {
            transform: translateY(350px) rotate(420deg);
            opacity: 0;
        }
    </style>
</head>
<body>
    <div class="sparkle-bg">
        <span>✨</span><span>🌟</span><span>💖</span><span>🌸</span><span>✨</span>
    </div>

    <div id="app">
        <div class="game-header">
            <div class="game-title">
                <i>✨</i> 初恋模拟器 · 故事版 <i>💗</i>
            </div>
            <div class="game-stats-mini">
                <span>📅 第 <strong id="displayRound">0</strong> 周</span>
                <span>📚 <strong id="displayGrade">大一</strong></span>
                <span>❤️ <strong id="displayLoveStatus" class="stat-highlight">单身</strong></span>
                <span>💰 ¥<strong id="displayMoney">0</strong></span>
            </div>
        </div>

        <div class="game-body">
            <div class="narrative-panel" id="narrativePanel">
                <div class="narrative-content" id="narrativeContent">
                    <div class="msg-system">🌸✨ 欢迎来到完整故事版～ 每个行动都有细腻剧情。</div>
                    <div class="msg-system">点击 <strong>开始游戏</strong> 开启你的大学初恋之旅。</div>
                </div>
            </div>
            <div class="status-panel" id="statusPanel">
                <div class="status-section-title">👤 玩家档案</div>
                <div class="status-row"><span class="label">姓名</span><span id="sName">—</span></div>
                <div class="status-row"><span class="label">性别</span><span id="sGender">—</span></div>
                <div class="status-row"><span class="label">出身</span><span id="sOrigin">—</span></div>
                <div class="status-row"><span class="label">专业</span><span id="sMajor">—</span></div>
                <div class="status-row"><span class="label">难度</span><span id="sDifficulty">—</span></div>
                <div class="status-section-title">📊 核心属性</div>
                <div class="status-row"><span class="label">❤️ 心情</span><span class="value" id="sMood">50</span></div>
                <div class="status-row"><span class="label">💪 健康</span><span class="value" id="sHealth">80</span></div>
                <div class="status-row"><span class="label">🧠 智商</span><span class="value" id="sIQ">—</span></div>
                <div class="status-row"><span class="label">🗣 口才</span><span class="value" id="sSpeech">50</span></div>
                <div class="status-row"><span class="label">🏃 才艺</span><span class="value" id="sSport">50</span></div>
                <div class="status-row"><span class="label">🍀 运气</span><span class="value" id="sLucky">50</span></div>
                <div class="status-row"><span class="label">📈 绩点</span><span class="value" id="sGPA">2.0</span></div>
                <div class="status-row"><span class="label">💤 疲惫</span><span class="value" id="sTired">0</span></div>
                <div class="status-row"><span class="label">💕 恋爱经验</span><span class="value" id="sLoveExp">0</span></div>
                <div class="status-section-title">💖 NPC好感 (点击切换目标)</div>
                <div id="npcList"><div class="text-muted">尚未结识</div></div>
                <div class="status-section-title">📰 校园舆论</div>
                <div id="sOpinion" style="font-size:13px;color:#b05a6a;">暂无</div>
            </div>
        </div>

        <div class="action-bar" id="actionBar">
            <button class="action-btn primary" id="btnStart">🌸 开始游戏</button>
            <button class="action-btn" id="btnStatus">📋 查看状态</button>
            <button class="action-btn secondary" id="btnEnd">🏁 结束游戏</button>
            <span class="action-hint" id="actionHint">点击开始创建角色</span>
        </div>
    </div>

    <script>
        // ============================================================
        //  完整故事版 · 所有功能齐全
        // ============================================================

        const rand = (min, max) => Math.floor(Math.random() * (max - min + 1)) + min;
        const pick = (arr) => arr[rand(0, arr.length - 1)];
        const clamp = (v, lo, hi) => Math.max(lo, Math.min(hi, v));

        // ---------- 游戏状态 ----------
        const G = {
            name: '', gender: '男', origin: '小镇普通家庭', difficulty: '标准',
            uniType: '综合本科', orientation: '不限', descMode: '详细细腻', major: '文科',
            appearance: 70, eq: 50, mood: 70, iq: 50, style: 60, speech: 55, sport: 50,
            lucky: 50, health: 80, money: 0, gpa: 2.0, loveExp: 0, tired: 0,
            fame: 0, reputation: 50, heartThreshold: 50,
            round: 0, grade: 1, weekInGrade: 0, month: 1,
            isGameOver: false, isInSetup: true,
            loveStatus: '单身', npcLikes: {}, npcList: [], currentTarget: null,
            loverName: null, isDating: false, isColdWar: false, coldWarWeeks: 0,
            breakupCount: 0, weekHours: 12,
            opinion: '校园生活平静如水。',
            waitingChoice: false, choiceList: [], choiceCallback: null,
            setupStep: 0, setupData: {},
            totalDates: 0, totalGifts: 0, totalConflicts: 0,
            inDateFlow: false, pendingResults: [],
            monthlyIncome: 0, monthlySpent: 0, monthStartMoney: 0,
            // 用于随机事件冷却
            eventCooldown: 0,
            // 记录已触发的事件，避免重复
            eventHistory: [],
        };

        // ---------- NPC池 ----------
        const NPC_POOL = {
            男: [
                { name: '林逸', desc: '计算机系学霸，温柔内敛', personality: '内向' },
                { name: '陈晨', desc: '篮球队长，阳光开朗', personality: '外向' },
                { name: '周子轩', desc: '文艺青年，弹吉他细腻', personality: '敏感' },
                { name: '赵一鸣', desc: '学生会干部，社交达人', personality: '社交' },
                { name: '陆远', desc: '医学生，沉稳可靠', personality: '沉稳' },
            ],
            女: [
                { name: '苏念', desc: '中文系才女，温柔安静', personality: '内向' },
                { name: '李欣桐', desc: '舞蹈社社长，活泼大方', personality: '外向' },
                { name: '顾清', desc: '学霸，理性冷静', personality: '沉稳' },
                { name: '许甜甜', desc: '可爱萌妹，声音软糯', personality: '敏感' },
                { name: '沈悦', desc: '学生会外联部，开朗直率', personality: '社交' },
            ]
        };

        const ORIGIN_CONFIG = {
            '小镇普通家庭': { moneyBonus: 0, moneyBase: 1500, parentInterfere: 0.2 },
            '城市中产': { moneyBonus: 800, moneyBase: 2300, parentInterfere: 0.6 },
            '工薪家庭': { moneyBonus: 0, moneyBase: 1800, parentInterfere: 0.3 },
            '小康独子': { moneyBonus: 1500, moneyBase: 2800, parentInterfere: 0.8 },
            '农村低保': { moneyBonus: -600, moneyBase: 900, parentInterfere: 0.1 },
        };

        const DIFFICULTY_CONFIG = {
            '休闲': { eventPenalty: 0.5, bonusMult: 2.0, conflictRate: 0.1, moneyMult: 0.8 },
            '标准': { eventPenalty: 1.0, bonusMult: 1.0, conflictRate: 0.25, moneyMult: 1.0 },
            '硬核': { eventPenalty: 2.0, bonusMult: 0.6, conflictRate: 0.45, moneyMult: 1.3 },
            '现实': { eventPenalty: 2.5, bonusMult: 0.4, conflictRate: 0.6, moneyMult: 1.5 },
        };

        // ============================================================
        //  UI 更新
        // ============================================================

        function updateUI() {
            document.getElementById('displayRound').textContent = G.round;
            const gradeNames = ['大一', '大二', '大三', '大四'];
            document.getElementById('displayGrade').textContent = gradeNames[G.grade - 1] || '大四';
            document.getElementById('displayLoveStatus').textContent = G.loveStatus;
            document.getElementById('displayMoney').textContent = Math.floor(G.money);

            document.getElementById('sName').textContent = G.name || '—';
            document.getElementById('sGender').textContent = G.gender || '—';
            document.getElementById('sOrigin').textContent = G.origin || '—';
            document.getElementById('sMajor').textContent = G.major || '—';
            document.getElementById('sDifficulty').textContent = G.difficulty || '—';

            document.getElementById('sMood').textContent = Math.floor(G.mood);
            document.getElementById('sMood').className = 'value' + (G.mood < 40 ? ' danger' : G.mood < 60 ? ' warn' : ' good');
            document.getElementById('sHealth').textContent = Math.floor(G.health);
            document.getElementById('sHealth').className = 'value' + (G.health < 40 ? ' danger' : G.health < 60 ? ' warn' : ' good');
            document.getElementById('sIQ').textContent = Math.floor(G.iq);
            document.getElementById('sSpeech').textContent = Math.floor(G.speech);
            document.getElementById('sSport').textContent = Math.floor(G.sport);
            document.getElementById('sLucky').textContent = Math.floor(G.lucky);
            document.getElementById('sGPA').textContent = G.gpa.toFixed(2);
            document.getElementById('sTired').textContent = Math.floor(G.tired);
            document.getElementById('sLoveExp').textContent = Math.floor(G.loveExp);

            const npcDiv = document.getElementById('npcList');
            const entries = Object.entries(G.npcLikes).filter(([k, v]) => v > 0);
            if (entries.length === 0) {
                npcDiv.innerHTML = '<div class="text-muted">尚未结识</div>';
            } else {
                npcDiv.innerHTML = entries.map(([name, like]) => {
                    const isTarget = (name === G.currentTarget);
                    return `<div class="npc-item ${isTarget ? 'target' : ''}" data-name="${name}">
                        <span class="npc-name">${name} ${isTarget ? '⭐' : ''}</span>
                        <span class="npc-like">💗 ${Math.floor(like)}</span>
                    </div>`;
                }).join('');
                document.querySelectorAll('.npc-item').forEach(el => {
                    el.addEventListener('click', () => {
                        const name = el.dataset.name;
                        if (name && G.npcLikes[name] !== undefined) {
                            G.currentTarget = name;
                            narrate(`💬 你将注意力转向 ${name}`, 'dm');
                            updateUI();
                        }
                    });
                });
            }

            document.getElementById('sOpinion').textContent = G.opinion || '暂无';
            const hint = document.getElementById('actionHint');
            if (G.isGameOver) hint.textContent = '🏁 已结束，点击「开始游戏」重来';
            else if (G.isInSetup) hint.textContent = '✏️ 创建角色中...';
            else if (G.waitingChoice) hint.textContent = '👆 请选择一个选项';
            else if (G.inDateFlow) hint.textContent = '💕 约会进行中...';
            else hint.textContent = `⏳ 本周剩余 ${G.weekHours}h · 当前目标: ${G.currentTarget || '无'}`;
        }

        function narrateClear() {
            document.getElementById('narrativeContent').innerHTML = '';

        // ---------- 选择器 ----------
        function showChoices(choices, callback) {
            G.waitingChoice = true;
            G.choiceList = choices;
            G.choiceCallback = callback;

            const panel = document.getElementById('narrativeContent');
            const block = document.createElement('div');
            block.className = 'choice-block fade-in';
            block.id = 'choiceBlock';

            choices.forEach((item, idx) => {
                const btn = document.createElement('div');
                btn.className = 'choice-item';
                btn.textContent = `💗 ${idx+1}. ${item.text}`;
                btn.dataset.idx = idx;
                btn.addEventListener('click', (e) => {
                    triggerPetals(e.clientX, e.clientY);
                    if (G.waitingChoice) {
                        G.waitingChoice = false;
                        document.querySelectorAll('.choice-item').forEach(el => el.classList.remove('selected'));
                        btn.classList.add('selected');
                        document.querySelectorAll('.choice-item').forEach(el => el.classList.add('disabled'));
                        if (G.choiceCallback) {
                            const cb = G.choiceCallback;
                            G.choiceCallback = null;
                            cb(idx);
                        }
                    }
                });
                block.appendChild(btn);
            });
            panel.appendChild(block);
            panel.scrollTop = panel.scrollHeight;
            updateUI();
        }

        function removeChoices() {
            const block = document.getElementById('choiceBlock');
            if (block) block.remove();
            G.waitingChoice = false;
            G.choiceList = [];
            G.choiceCallback = null;
        }

        function triggerPetals(x, y) {
            const count = 18;
            const emojis = ['🌸', '🌺', '🌷', '💮', '✨', '🌟'];
            for (let i = 0; i < count; i++) {
                const petal = document.createElement('div');
                petal.className = 'petal';
                petal.textContent = pick(emojis);
                petal.style.left = (x + rand(-40, 40)) + 'px';
                petal.style.top = (y + rand(-30, 30)) + 'px';
                petal.style.fontSize = rand(14, 28) + 'px';
                petal.style.transform = `rotate(${rand(0, 360)}deg)`;
                document.body.appendChild(petal);
                requestAnimationFrame(() => {
                    petal.style.transform = `translate(${rand(-120, 120)}px, ${rand(150, 350)}px) rotate(${rand(0, 720)}deg)`;
                    petal.style.opacity = '0';
                });
                setTimeout(() => petal.remove(), 2500);
            }
        }

        // ---------- 属性修改 ----------
        function modAttr(attr, delta, reason = '') {
            if (G.isGameOver) return;
            const old = G[attr];
            let newVal = old + delta;
            if (attr === 'mood') newVal = clamp(newVal, 0, 100);
            else if (attr === 'health') newVal = clamp(newVal, 0, 100);
            else if (attr === 'tired') newVal = Math.max(0, newVal);
            else if (attr === 'money') newVal = Math.max(0, newVal);
            else if (attr === 'gpa') newVal = clamp(newVal, 0, 4.0);
            else if (attr === 'loveExp') newVal = clamp(newVal, 0, 100);
            else if (attr === 'iq') newVal = clamp(newVal, 30, 100);
            else if (attr === 'speech') newVal = clamp(newVal, 30, 100);
            else if (attr === 'sport') newVal = clamp(newVal, 30, 100);
            else if (attr === 'lucky') newVal = clamp(newVal, 1, 100);
            else if (attr === 'appearance') newVal = clamp(newVal, 60, 100);
            else if (attr === 'style') newVal = clamp(newVal, 60, 100);
            else if (attr === 'eq') newVal = clamp(newVal, 30, 100);
            else if (attr === 'fame') newVal = clamp(newVal, 0, 100);
            else if (attr === 'reputation') newVal = clamp(newVal, 0, 100);
            else newVal = newVal;

            const actual = newVal - G[attr];
            G[attr] = newVal;
            if (actual !== 0 && reason) {
                const sign = actual > 0 ? '+' : '';
                G.pendingResults.push(`${attr} ${sign}${actual.toFixed(1)} (${reason})`);
            }
            updateUI();
        }

        function modNpcLike(name, delta, reason = '') {
            if (!name || G.isGameOver) return;
            if (!G.npcLikes[name]) G.npcLikes[name] = 30;
            const old = G.npcLikes[name];
            let newVal = clamp(old + delta, 0, 100);
            G.npcLikes[name] = newVal;
            const actual = newVal - old;
            if (actual !== 0 && reason) {
                const sign = actual > 0 ? '+' : '';
                G.pendingResults.push(`${name} 好感 ${sign}${actual.toFixed(1)} (${reason})`);
            }
            if (G.loveStatus === '恋爱中' && G.loverName === name && newVal < 30) {
                G.loveStatus = '分手';
                G.pendingResults.push(`💔 与 ${name} 的感情走到尽头... 好感低于30，自动分手。`);
                G.loverName = null;
            }
            updateUI();
        }

        function flushResults() {
            if (G.pendingResults.length > 0) {
                const msg = '📊 ' + G.pendingResults.join(' · ');
                narrate(msg, 'result');
                G.pendingResults = [];
            }
        }

        // ============================================================
        //  月度结算系统
        // ============================================================

        function monthlySettle() {
            // 每月初 (第1周) 显示生活费收入
            if (G.weekInGrade === 0) {
                const base = ORIGIN_CONFIG[G.origin]?.moneyBase || 1500;
                const bonus = ORIGIN_CONFIG[G.origin]?.moneyBonus || 0;
                const income = base + bonus + rand(0, 200);
                G.monthlyIncome = income;
                G.monthStartMoney = G.money;
                G.monthlySpent = 0;
                narrate(`💰 月初父母给生活费 ¥${income}，当前余额 ¥${Math.floor(G.money)}`, 'monthly');
                // 显示本月预算
                narrate(`📋 本月预计开销：伙食¥800-1500，水电日用品¥150-300，学习资料¥100-400，话费网费¥100`, 'system');
            }

            // 每月末 (第4周) 结算
            if (G.weekInGrade === 3) {
                const spent = G.monthStartMoney - G.money + G.monthlyIncome;
                G.monthlySpent = Math.max(0, spent);
                const balance = G.money;
                narrate(`📊 月末结算：本月收入 ¥${G.monthlyIncome}，支出 ¥${Math.floor(G.monthlySpent)}，余额 ¥${Math.floor(balance)}`, 'monthly');
                // 生成月度舆论板块
                generateMonthlyOpinion();
                // 检查赤字
                if (balance < 0) {
                    narrate('⚠️ 生活费赤字！下月将削减开支。', 'event');
                    modAttr('money', 200, '紧急补助');
                }
                // 更新月数
                G.month++;
            }
        }

        // ---------- 月度舆论 (学业、感情、人际) ----------
        function generateMonthlyOpinion() {
            let academic = '', love = '', social = '';
            // 学业
            if (G.gpa >= 3.5) academic = '📚 学业表现优异，绩点名列前茅，有望获得奖学金。';
            else if (G.gpa >= 2.5) academic = '📚 学业稳步推进，绩点中等，继续努力可保研。';
            else if (G.gpa >= 1.5) academic = '📚 学业有些吃力，绩点偏低，需要抓紧复习。';
            else academic = '📚 学业警告！多门课程挂科，面临延毕风险。';

            // 感情
            if (G.loveStatus === '恋爱中' && G.loverName) {
                love = `💕 你和 ${G.loverName} 的恋情在校园里传开，有人祝福也有人酸。`;
            } else if (G.loveStatus === '分手') {
                love = `💔 你和 ${G.loverName || '前任'} 分手的事成为大家茶余饭后的谈资。`;
            } else if (G.currentTarget && G.npcLikes[G.currentTarget] >= 50) {
                love = `😳 大家都在悄悄磕你和 ${G.currentTarget} 的CP。`;
            } else {
                love = '💭 感情生活平淡，尚未有特别的发展。';
            }

            // 人际
            if (G.reputation >= 70) social = '👥 你在同学中口碑很好，大家都觉得你友善可靠。';
            else if (G.reputation >= 50) social = '👥 人际关系正常，有几个知心朋友。';
            else if (G.reputation >= 30) social = '👥 人际关系有些紧张，需要注意言行。';
            else social = '👥 人际关系较差，需要反思自己的处事方式。';

            const opinion = `【本月舆论】\n${academic}\n${love}\n${social}`;
            G.opinion = opinion;
            narrate(opinion, 'monthly');
        }

        // ============================================================
        //  周结算 (含月度结算)
        // ============================================================

        function weekSettle() {
            // 疲惫结算
            const tired = G.tired;
            let healthLoss = 0;
            if (tired >= 31) healthLoss = -22;
            else if (tired >= 23) healthLoss = -12;
            else if (tired >= 15) healthLoss = -7;
            else if (tired >= 8) healthLoss = -3;
            if (healthLoss < 0) modAttr('health', healthLoss, '疲惫累积');
            modAttr('tired', -Math.min(G.tired, 4), '周结算恢复');

            if (G.health <= 19) {
                narrate('🏥 健康严重透支，校医院卧床两周...', 'event');
                G.health = 20;
                modAttr('health', 5, '卧床恢复');
            }
            if (G.mood < 50) modAttr('mood', 2, '心情自然恢复');
            if (G.loveStatus === '恋爱中') modAttr('loveExp', 0.5, '恋爱中经验积累');

            if (G.isColdWar) {
                G.coldWarWeeks--;
                if (G.loverName) modNpcLike(G.loverName, -2, '冷战好感流失');
                modAttr('mood', -3, '冷战心情低落');
                if (G.coldWarWeeks <= 0) {
                    G.isColdWar = false;
                    narrate('🤝 冷战结束了，关系缓和。', 'event');
                }
            }

            // 月度结算 (每4周)
            if (G.weekInGrade === 0) {
                monthlySettle();
            }

            // 随机事件 (每回合掷1d12)
            if (G.round > 0 && !G.isGameOver && !G.isInSetup) {
                const roll = rand(1, 12);
                if (roll <= 4) {
                    triggerRandomEvent();
                    return; // 事件内部会调用 weekSettleEnd
                }
            }

            flushResults();
            weekSettleEnd();
        }

        function weekSettleEnd() {
            G.round++;
            G.weekInGrade++;
            if (G.weekInGrade >= 4) {
                G.weekInGrade = 0;
                // 年级升级 (每16周升一级)
                if (G.round % 16 === 0 && G.grade < 4) {
                    G.grade++;
                    narrate(`🎓 升入${['大二','大三','大四'][G.grade-2]}！`, 'event');
                    if (G.grade === 4) narrate('📅 大四了，毕业抉择临近。', 'event');
                }
            }
            // 检查结局：大四结束 (第64周)
            if (G.grade === 4 && G.weekInGrade === 0 && G.round >= 64) {
                narrate('🎓 大学四年结束！', 'event');
                triggerEnding();
                return;
            }
            G.weekHours = 12;
            if (!G.isGameOver && !G.isInSetup && !G.waitingChoice) {
                setTimeout(showWeekActions, 400);
            }
            updateUI();
        }

                // 7: 拍照互动
                () => {
                    narrate(`📸 你们路过一个网红打卡点， ${target} 拿出手机想拍照。`, 'event');
                    const choices = [
                        { text: '主动帮对方拍照，询问喜好' },

                        { text: '抓拍丑照开玩笑' },

                    showChoices(choices, (idx) => {
                        if (idx === 0) {
                            modNpcLike(target, 4, '耐心拍照');
                            modAttr('mood', 3, '愉快');
                            narrate(`你认真帮 ${target} 拍了好几张，对方特别满意，笑容灿烂。`, 'dm');

                            { text: '认真汇报，让父母放心' },

                            flushResults();
                            weekSettleEnd();

                    // 如果是恋爱中，触发学业平衡事件
                    narrate(`📚 你最近因为恋爱有些分心，期中考试成绩不太理想。`, 'event');
                    const choices = [
                        { text: '和恋人商量，互相督促学习' },
                        { text: '减少约会时间，专注复习' },
                        { text: '继续维持现状，相信能兼顾' },
                    ];
                    showChoices(choices, (idx) => {
                        if (idx === 0) {
                            modNpcLike(G.loverName, 3, '共同进步');
                            modAttr('gpa', 0.05, '互相督促');
                            modAttr('mood', 3, '安心');
                            narrate(`你和 ${G.loverName} 约定一起上自习，效率高了很多。`, 'dm');
                        } else if (idx === 1) {
                            modNpcLike(G.loverName, -2, '减少见面');
                            modAttr('gpa', 0.08, '专注学习');
                            modAttr('mood', -2, '想念');
                            narrate(`你告诉对方需要专心复习，虽然有些不舍，但成绩有了起色。`, 'dm');
                        } else {
                            modAttr('gpa', -0.05, '分心');
                            modAttr('mood', -2, '焦虑');
                            narrate(`你觉得可以兼顾，但考试结果并不理想，开始有些焦虑。`, 'dm');
                        }
                        removeChoices();
                        flushResults();
                        weekSettleEnd();
                    });
                },
            ];

            const evt = events[eventType];
            if (evt) evt();
            else {
                narrate('🌤️ 这周平静地过去了。', 'system');
                weekSettleEnd();
            }
            G.eventCooldown = 1; // 冷却1回合
        }

        // ============================================================
        //  结局系统
        // ============================================================

        function triggerEnding() {
            if (G.isGameOver) return;
            G.isGameOver = true;
            let loveEnding = '', careerEnding = '', finalEnding = '';
            if (G.loveStatus === '恋爱中' && G.loverName) {
                const like = G.npcLikes[G.loverName] || 0;
                if (like >= 80) loveEnding = '初恋走到毕业 💕';
                else if (like >= 60) loveEnding = '平淡相守，未来未知 💗';
                else loveEnding = '感情渐淡，毕业即分手 💔';
            } else if (G.loveStatus === '分手') loveEnding = '遗憾分手，各奔前程 💔';
            else if (G.currentTarget && G.npcLikes[G.currentTarget] >= 60) loveEnding = '全程暗恋，从未告白 🌙';
            else loveEnding = '专注自我，独行四年 🌟';

            if (G.gpa >= 3.5) careerEnding = '保研上岸 / 奖学金双丰收 📚';
            else if (G.gpa >= 2.5) careerEnding = '顺利毕业，普通就业 🎓';
            else if (G.gpa >= 1.5) careerEnding = '多门挂科，勉强毕业 ⚠️';
            else careerEnding = '学业荒废，延毕风险 🚨';

            const endings = [
                '圆满青春：初恋相伴 + 保研成功 ✨',
                '独自前行：分手之后独自上岸 💪',
                '平淡散场：短暂初恋，普通毕业 🌅',
                '恋爱优先：为爱放弃深造，异地同行 💞',
                '单身学霸：全程无恋爱，拿奖保研 🏆',
                '虚度四年：感情内耗，挂科分手 🌧️',
                '双向成长：互相督促，双双拿offer 🌈',
                '青涩遗憾：暗恋四年，孤身毕业 🌙',
            ];
            if (loveEnding.includes('初恋走到毕业') && careerEnding.includes('保研')) finalEnding = endings[0];
            else if (loveEnding.includes('遗憾分手') && careerEnding.includes('保研')) finalEnding = endings[1];
            else if (loveEnding.includes('平淡相守') && careerEnding.includes('顺利毕业')) finalEnding = endings[2];
            else if (loveEnding.includes('初恋走到毕业') && careerEnding.includes('普通就业')) finalEnding = endings[3];
            else if (loveEnding.includes('专注自我') && careerEnding.includes('保研')) finalEnding = endings[4];
            else if (loveEnding.includes('感情渐淡') && careerEnding.includes('挂科')) finalEnding = endings[5];
            else if (loveEnding.includes('初恋走到毕业') && careerEnding.includes('奖学金')) finalEnding = endings[6];
            else if (loveEnding.includes('全程暗恋') && careerEnding.includes('普通就业')) finalEnding = endings[7];
            else finalEnding = `${loveEnding} · ${careerEnding}`;

            narrate('🏁 ===== 游戏结束 =====', 'dm');
            narrate(`📖 结局：${finalEnding}`, 'event');
            narrate(`💬 ${loveEnding}`, 'system');
            narrate(`📚 ${careerEnding}`, 'system');
            narrate(`📊 总回合：${G.round} 周`, 'system');
            narrate(`❤️ 最终好感：${G.loverName ? G.npcLikes[G.loverName]||0 : '无'}`, 'system');
            narrate(`📈 最终绩点：${G.gpa.toFixed(2)}`, 'system');
            narrate('感谢游玩 💗 点击「开始游戏」重新体验。', 'dm');
            document.getElementById('btnStart').textContent = '🔄 重新开始';
            updateUI();
        }

        // ============================================================
        //  开局流程
        // ============================================================

        function startSetup() {
            G.isInSetup = true;
            G.setupStep = 0;
            G.setupData = {};
            narrateClear();
            narrate('🌸✨ 欢迎来到完整故事版', 'dm');
            narrate('📋 请依次回答以下问题，创建你的角色。', 'dm');
            askNextSetup();
        }

        const setupQuestions = [
            { id: 'name', text: '1. 你的姓名是？', type: 'input', default: '小柠' },
            { id: 'gender', text: '2. 你的性别是？', type: 'choice', options: ['男', '女'] },
            { id: 'origin', text: '3. 你的出身是？', type: 'choice', options: ['小镇普通家庭', '城市中产', '工薪家庭', '小康独子', '农村低保'] },
            { id: 'difficulty', text: '4. 选择游戏难度：', type: 'choice', options: ['休闲', '标准', '硬核', '现实'] },
            { id: 'uniType', text: '5. 院校类型：', type: 'choice', options: ['综合本科', '理工类院校', '文科院校', '艺术类院校'] },
            { id: 'orientation', text: '6. 恋爱取向：', type: 'choice', options: ['不限', '仅异性', '仅同性'] },
            { id: 'descMode', text: '7. 描写模式：', type: 'choice', options: ['详细细腻', '含蓄留白'] },
            { id: 'major', text: '8. 专业类别：', type: 'choice', options: ['文科', '理科', '工科', '艺术', '医学'] },
        ];

        function askNextSetup() {
            if (G.setupStep >= setupQuestions.length) { finishSetup(); return; }
            const q = setupQuestions[G.setupStep];
            narrate(`📌 ${q.text}`, 'dm');
            if (q.type === 'input') {
                const val = prompt(q.text, q.default || '');
                if (val !== null && val.trim()) G.setupData[q.id] = val.trim();
                else G.setupData[q.id] = q.default || '小柠';
                G.setupStep++;
                askNextSetup();
            } else if (q.type === 'choice') {
                const choices = q.options.map(opt => ({ text: opt }));
                showChoices(choices, (idx) => {
                    G.setupData[q.id] = q.options[idx];
                    G.setupStep++;
                    removeChoices();
                    askNextSetup();
                });
            }
        }

        function finishSetup() {
            const d = G.setupData;
            G.name = d.name || '小柠';
            G.gender = d.gender || '男';
            G.origin = d.origin || '小镇普通家庭';
            G.difficulty = d.difficulty || '标准';
            G.uniType = d.uniType || '综合本科';
            G.orientation = d.orientation || '不限';
            G.descMode = d.descMode || '详细细腻';
            G.major = d.major || '文科';

            const base = ORIGIN_CONFIG[G.origin] || { moneyBase: 1500, moneyBonus: 0 };
            G.money = base.moneyBase + base.moneyBonus + rand(0, 400);
            G.appearance = rand(65, 85);
            G.iq = rand(50, 75);
            G.eq = rand(45, 70);
            G.speech = rand(45, 70);
            G.sport = rand(40, 75);
            G.lucky = rand(30, 70);
            G.mood = rand(60, 85);
            G.health = rand(70, 90);
            G.style = rand(55, 80);
            G.gpa = 2.0 + Math.random() * 0.8;
            G.loveExp = 0;
            G.tired = 0;
            G.fame = 10;
            G.reputation = 50;
            G.month = 1;

            generateNPCs();
            let best = null, bestLike = -1;
            for (const [name, like] of Object.entries(G.npcLikes)) {
                if (like > bestLike) { bestLike = like; best = name; }
            }
            G.currentTarget = best;

            G.isInSetup = false;
            G.round = 0;
            G.grade = 1;
            G.weekInGrade = 0;
            G.loveStatus = '单身';
            G.isGameOver = false;
            G.weekHours = 12;

            narrate('✅ 角色创建完成！', 'dm');
            narrate(`👤 ${G.name} · ${G.gender} · ${G.origin} · ${G.major} · ${G.difficulty}`, 'system');
            narrate(`💖 可攻略NPC：${Object.keys(G.npcLikes).join('、')}`, 'system');
            narrate(`🎯 当前目标：${G.currentTarget} (点击状态面板NPC可切换)`, 'system');
            narrate('📅 大一新生生活开始！每周12小时自由行动。', 'dm');
            narrate('💡 每个行动都会展开细腻剧情，选择将影响故事走向。', 'system');
            generateMonthlyOpinion();
            updateUI();
            document.getElementById('btnStart').textContent = '🔄 重新开始';
            G.weekHours = 12;
            setTimeout(showWeekActions, 500);
        }

        function generateNPCs() {
            const pool = G.gender === '男' ? NPC_POOL.女 : NPC_POOL.男;
            let selected = [...pool].sort(() => Math.random() - 0.5).slice(0, 4);
            if (G.orientation === '仅同性') {
                const samePool = G.gender === '男' ? NPC_POOL.男 : NPC_POOL.女;
                selected = [...samePool].sort(() => Math.random() - 0.5).slice(0, 4);
            }
            G.npcList = selected;
            G.npcLikes = {};
            selected.forEach(npc => { G.npcLikes[npc.name] = rand(20, 40); });
        }

        // ============================================================
        //  表白系统
        // ============================================================

        function confess() {
            const target = G.currentTarget;
            if (!target) {
                narrate('💭 你还没有选定追求目标呢，点击NPC切换目标。', 'system');
                return;
            }
            if (G.loveStatus === '恋爱中') {
                narrate('💕 你已经恋爱了，专心经营现在的感情吧。', 'system');
                return;
            }
            const like = G.npcLikes[target] || 0;
            if (like < 61) {
                narrate(`😅 对 ${target} 的好感还不够 (${Math.floor(like)})，再培养培养。`, 'system');
                return;
            }
            narrate(`💌 你决定向 ${target} 表白！`, 'dm');
            const choices = [
                { text: '💐 浪漫表白：准备鲜花和情书' },
                { text: '🗣️ 直接告白：当面说出心意' },
                { text: '📱 线上表白：发消息说出感情' },
            ];
            showChoices(choices, (idx) => {
                let baseChance = 0.5 + (G.speech - 50) * 0.005 + (G.lucky - 50) * 0.003 + (G.appearance - 60) * 0.01;
                baseChance = clamp(baseChance, 0.1, 0.95);
                if (idx === 0) baseChance += 0.15;
                else if (idx === 1) baseChance += 0.05;
                else baseChance -= 0.1;
                const success = Math.random() < baseChance;
                if (success) {
                    G.loveStatus = '恋爱中';
                    G.loverName = target;
                    G.isDating = true;
                    modNpcLike(target, 10, '表白成功 💕');
                    modAttr('mood', 20, '恋爱喜悦');
                    modAttr('loveExp', 5, '初恋经验');
                    narrate(`🎉 表白成功！${target} 接受了你的心意！你们紧紧相拥。`, 'event');
                } else {
                    modNpcLike(target, -10, '表白被拒');
                    modAttr('mood', -15, '失恋打击');
                    narrate(`😢 表白被 ${target} 委婉拒绝了... 你有些失落。`, 'event');
                }
                removeChoices();
                flushResults();
                updateUI();
                weekSettleEnd();
            });
        }

        // ============================================================
        //  每周行动系统 (完整剧情)
        // ============================================================

        function showWeekActions() {
            if (G.isGameOver || G.isInSetup || G.waitingChoice || G.inDateFlow) return;
            if (G.weekHours <= 0) {
                narrate('⏰ 本周时间用完了！进入下周。', 'system');
                weekSettle();
                return;
            }
            const actions = [
                { id: 1, text: '📚 图书馆刷题复习', cost: 3, money: 0 },
                { id: 2, text: '🏃 操场运动健身', cost: 2, money: 0 },
                { id: 3, text: '👔 学习穿搭/约会礼仪', cost: 1, money: 100 },
                { id: 4, text: '💬 主动搭讪心动对象', cost: 2, money: 30 },
                { id: 5, text: '🍻 和室友聚餐唠嗑', cost: 2, money: 100 },
                { id: 6, text: '🍽️ 双人校外正餐 (约会)', cost: 4, money: 150 },
                { id: 7, text: '🎭 社团活动团建', cost: 3, money: 50 },
                { id: 8, text: '😴 独处休息睡觉', cost: 3, money: 0 },
                { id: 9, text: '💼 兼职打工', cost: 4, money: 0 },
                { id: 10, text: '🎁 准备礼物', cost: 2, money: 200 },
                { id: 11, text: '📱 刷校园论坛/朋友圈', cost: 1, money: 0 },
                { id: 12, text: '📝 小组作业搭档协作', cost: 2, money: 0 },
                { id: 13, text: '🚶 短途周边一日游', cost: 6, money: 500 },
                { id: 14, text: '🎤 参加校园晚会/竞赛', cost: 3, money: 50 },
                { id: 15, text: '💞 化解感情矛盾', cost: 2, money: 30 },
                { id: 16, text: '💌 向心动对象表白', cost: 1, money: 0 },
            ];
            const available = actions.filter(a => a.cost <= G.weekHours);
            if (available.length === 0) {
                narrate('⏰ 剩余时间不足，进入下周。', 'system');
                weekSettle();
                return;
            }
            narrate(`📅 第 ${G.round+1} 周 · 剩余 ${G.weekHours}h · 选择行动 (目标: ${G.currentTarget || '无'}):`, 'dm');
            const choices = available.map(a => ({ text: `${a.text} (${a.cost}h, ¥${a.money})`, action: a }));
            showChoices(choices, (idx) => {
                const action = choices[idx].action;
                removeChoices();
                G.weekHours -= action.cost;
                if (action.money > 0) modAttr('money', -action.money, action.text);
                const scene = actionScenes[action.id];
                if (scene) scene(action);
                else {
                    narrate(`⏳ 你选择了 ${action.text}，但还没有剧情，先跳过。`, 'system');
                    afterAction();
                }
            });
        }

        // ---------- 所有行动剧情 (带故事感) ----------
        const actionScenes = {

            1: (action) => {
                const target = G.currentTarget;
                const like = target ? G.npcLikes[target] || 0 : 0;
                narrate(`📖 你走进图书馆，空气中弥漫着书页的香气。你选了个靠窗的位置，阳光洒在桌面上。${target ? '你注意到 ' + target + ' 在不远处认真看书。' : '四周很安静，只有翻书声。'}`, 'dm');
                let choices = [];
                if (target && like >= 30) {
                    choices = [
                        { text: '专注刷题，互不打扰' },
                        { text: '主动借笔记给对方，搭话' },
                        { text: '偷偷观察对方，心不在焉' },
                    ];
                } else if (target && like < 30) {
                    choices = [

        function startDateFlow() {
            if (!G.currentTarget) { narrate('😅 没有目标，无法约会。', 'system'); afterAction(); return; }
            G.inDateFlow = true;
            const shuffled = [...DATE_MODULES].sort(() => Math.random() - 0.5);
            const selected = shuffled.slice(0, 5);
            G.dateModules = selected;
            G.dateIndex = 0;
            narrate(`🌸 你约了 ${G.currentTarget} 共进晚餐，精心打扮了一番，心里既期待又紧张。`, 'dm');
            nextDateModule();
        }

        function nextDateModule() {
            if (G.dateIndex >= G.dateModules.length) {
                G.inDateFlow = false;
                narrate('💖 约会结束了！你们在路灯下告别，今晚的回忆格外美好。', 'dm');
                G.totalDates++;
                const bonus = rand(1, 4);
                modNpcLike(G.currentTarget, bonus, '约会综合印象');
                modAttr('tired', 3, '约会疲劳');
                flushResults();
                updateUI();
                if (G.weekHours <= 0) {
                    narrate('⏰ 本周时间用尽。', 'system');
                    weekSettle();
                } else {
                    setTimeout(showWeekActions, 400);
                }
                return;
            }
            const module = G.dateModules[G.dateIndex];
            narrate(`💬 ${module.name}`, 'dm');
            const choices = module.getChoices();
            showChoices(choices, (idx) => {
                removeChoices();
                module.resolve(idx);
                flushResults();
                G.dateIndex++;
                setTimeout(nextDateModule, 500);
            });
        }

        // ============================================================
        //  按钮事件
        // ============================================================

        document.getElementById('btnStart').addEventListener('click', () => {
            const confirmReset = G.round > 0 && !G.isGameOver ? confirm('确定要重新开始吗？当前进度将丢失。') : true;
            if (!confirmReset) return;
            // 重置所有状态
            const resetState = {
                name: '', gender: '男', origin: '小镇普通家庭', difficulty: '标准',
                uniType: '综合本科', orientation: '不限', descMode: '详细细腻', major: '文科',
                appearance: 70, eq: 50, mood: 70, iq: 50, style: 60, speech: 55, sport: 50,
                lucky: 50, health: 80, money: 0, gpa: 2.0, loveExp: 0, tired: 0,
                fame: 0, reputation: 50, heartThreshold: 50,
                round: 0, grade: 1, weekInGrade: 0, month: 1,
                isGameOver: false, isInSetup: true,
                loveStatus: '单身', npcLikes: {}, npcList: [], currentTarget: null,
                loverName: null, isDating: false, isColdWar: false, coldWarWeeks: 0,
                breakupCount: 0, weekHours: 12,
                opinion: '校园生活平静如水。',
                waitingChoice: false, choiceList: [], choiceCallback: null,
                setupStep: 0, setupData: {},
                totalDates: 0, totalGifts: 0, totalConflicts: 0,
                inDateFlow: false, pendingResults: [],
                monthlyIncome: 0, monthlySpent: 0, monthStartMoney: 0,
                eventCooldown: 0, eventHistory: [],
            };
            Object.assign(G, resetState);
            document.getElementById('narrativeContent').innerHTML = '';
            document.getElementById('btnStart').textContent = '⏳ 创建中...';
            startSetup();
        });

        document.getElementById('btnStatus').addEventListener('click', () => {
            if (G.isGameOver) { narrate('🏁 游戏已结束。', 'system'); return; }
            if (G.isInSetup) { narrate('✏️ 正在创建角色。', 'system'); return; }
            updateUI();
            narrate('📋 已刷新状态面板。', 'system');
        });

        document.getElementById('btnEnd').addEventListener('click', () => {
            if (G.isGameOver) { narrate('🏁 游戏已结束。', 'system'); return; }
            if (G.isInSetup) { narrate('✏️ 请先创建角色。', 'system'); return; }
            const confirmEnd = confirm('确定结束游戏？将触发结局判定。');
            if (confirmEnd) triggerEnding();
        });

        // 初始化
        updateUI();
        narrate('🌸✨ 完整故事版，每个行动都有细腻剧情。', 'dm');
        narrate('📖 点击「开始游戏」开启你的大学初恋之旅。', 'system');
    </script>
</body>
</html>
